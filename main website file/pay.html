<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Payment... | ICREATE SOLUTIONS</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/ZKJvnxxH/Untitled-design.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0f172a;
      --secondary-color: #06b6d4;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--primary-color);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(6, 182, 212, 0.2);
      border-left-color: var(--secondary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .digital-static::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="digital-static relative overflow-hidden">
  
  <div class="absolute inset-0 opacity-20 z-[-1]">
    <div class="absolute top-1/4 left-1/4 w-32 h-32 rounded-full bg-cyan-300 blur-3xl animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-32 h-32 rounded-full bg-cyan-300 blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
  </div>

  <div class="text-center px-6 max-w-md w-full bg-slate-900 bg-opacity-80 p-10 rounded-2xl shadow-2xl border border-cyan-800">
    <div class="flex justify-center mb-6">
      <div class="spinner"></div>
    </div>
    <h2 class="text-2xl font-bold mb-3">Connecting to Secure Gateway</h2>
    <p class="text-cyan-300 font-medium mb-1">WiPay Caribbean</p>
    <p class="text-sm text-gray-400 mb-6 font-mono" id="amount-display">Processing request...</p>
    
    <div class="w-full bg-slate-800 rounded-full h-2 mb-4 overflow-hidden">
      <div class="bg-cyan-400 h-2 rounded-full loader-bar w-0" style="transition: width 0.5s ease-out;"></div>
    </div>
    
    <p class="text-xs text-gray-500">Please do not close this window.</p>
  </div>

  <!-- Hidden WiPay Auto-submit Form -->
  <form id="wipay-form" action="https://jm.wipayfinancial.com/plugins/payments/request" method="POST" style="display:none;">
    <input type="hidden" name="account_number" value="7002610799">
    <input type="hidden" name="currency" value="JMD">
    <input type="hidden" name="total" id="form-amount" value="">
    <input type="hidden" name="fee_structure" value="customer_pay">
    <input type="hidden" name="method" value="credit_card">
    <input type="hidden" name="environment" value="live">
    <input type="hidden" name="country_code" value="JM">
    <input type="hidden" name="origin" id="form-origin" value="">
    <input type="hidden" name="order_id" id="form-order" value="">
    <input type="hidden" name="response_url" value="https://icreatesolutionsandservices.com/">
  </form>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      let rawAmount = urlParams.get('amount');
      const desc = urlParams.get('desc') || 'Invoice Payment';
      const orderId = urlParams.get('order_id') || `INV-${Math.floor(Math.random() * 1000000)}`;
      
      const amountDisplay = document.getElementById('amount-display');
      const formAmount = document.getElementById('form-amount');
      const formOrder = document.getElementById('form-order');
      const formOrigin = document.getElementById('form-origin');
      
      if (!rawAmount || isNaN(rawAmount) || parseFloat(rawAmount) <= 0) {
        amountDisplay.textContent = "Error: Invalid payment amount parameter.";
        amountDisplay.classList.add('text-red-400');
        amountDisplay.classList.remove('text-gray-400');
        
        // Remove spinner
        const spinner = document.querySelector('.spinner');
        if (spinner) spinner.style.display = 'none';
        return;
      }
      
      // Ensure amount has 2 decimal places as WiPay prefers clean numeric values
      const parsedAmount = parseFloat(rawAmount).toFixed(2);
      
      // Format number for display
      const formattedAmount = new Intl.NumberFormat('en-JM', { 
        style: 'currency', 
        currency: 'JMD' 
      }).format(parsedAmount);

      amountDisplay.textContent = `Amount: ${formattedAmount}`;
      
      // Populate form
      formAmount.value = parsedAmount;
      formOrder.value = orderId;
      formOrigin.value = 'iCreate-' + orderId;
      
      // Simulate progress bar and submit
      const loaderBar = document.querySelector('.loader-bar');
      setTimeout(() => { loaderBar.style.width = '30%'; }, 100);
      setTimeout(() => { loaderBar.style.width = '70%'; }, 500);
      setTimeout(() => { loaderBar.style.width = '100%'; }, 900);
      
      setTimeout(() => {
        document.getElementById('wipay-form').submit();
      }, 1200);
    });
  </script>
</body>
</html>
