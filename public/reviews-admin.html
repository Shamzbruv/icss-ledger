<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews Management | ICSS Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/icss-logo.png">
    <style>
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-pending { color: #ffa502; font-weight: bold; }
        .status-approved { color: #2ed573; font-weight: bold; }
        .status-hidden { color: #747d8c; font-weight: bold; }
        .status-deleted { color: #ff4757; font-weight: bold; }
        .rating-stars { color: #ffc107; letter-spacing: 2px; }

        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters-container select {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 8px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Layout.js injects Header here -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script type="module" src="js/layout.js"></script>

    <div class="container fade-in">
        <h1 class="mb-4">Reviews Management</h1>

        <!-- Stats Row -->
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Reviews</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPending" style="color: #ffa502;">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statApproved" style="color: #2ed573;">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAvgRating" style="color: #ffc107;">—</div>
                <div class="stat-label">Avg Rating</div>
            </div>
        </div>

        <div class="card">
            <div class="filters-container">
                <select id="filterStatus" onchange="filterTable()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="hidden">Hidden</option>
                </select>
                <select id="filterRating" onchange="filterTable()">
                    <option value="">All Ratings</option>
                    <option value="5">5 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="2">2 Stars</option>
                    <option value="1">1 Star</option>
                </select>
                <button class="btn btn-sm btn-outline-light" onclick="loadReviews()" style="margin-left: auto;">⟳ Refresh</button>
            </div>

            <div class="table-responsive">
                <table class="table-mobile-cards" id="reviewsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Rating</th>
                            <th>Service</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reviewsTableBody">
                        <tr><td colspan="6" class="text-center">Loading reviews...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- REVIEW DETAIL MODAL -->
    <div id="reviewDetailModal" class="modal-overlay d-none">
        <div class="modal-content card fade-in" style="max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 id="modalReviewTitle">Review Details</h3>
                <button class="btn btn-sm btn-outline-light" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalReviewId">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <small class="text-muted">Customer Name</small>
                        <div id="modalName"></div>
                    </div>
                    <div>
                        <small class="text-muted">Business</small>
                        <div id="modalBusiness"></div>
                    </div>
                    <div>
                        <small class="text-muted">Rating</small>
                        <div id="modalRating" class="rating-stars"></div>
                    </div>
                    <div>
                        <small class="text-muted">Service</small>
                        <div id="modalService"></div>
                    </div>
                    <div>
                        <small class="text-muted">Website</small>
                        <div><a id="modalUrl" href="#" target="_blank" style="color: var(--primary-color);"></a></div>
                    </div>
                    <div>
                        <small class="text-muted">Submitted</small>
                        <div id="modalDate"></div>
                    </div>
                </div>

                <div style="background: var(--bg-dark); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h4 style="margin-top: 0;">Review Message</h4>
                    <p id="modalMessage" style="white-space: pre-wrap;"></p>
                </div>

                <div>
                    <label>Status</label>
                    <select id="modalStatusSelect" class="form-control">
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; justify-content: space-between;">
                <button class="btn btn-outline-light" style="color: #ff4757; border-color: #ff4757;" onclick="archiveReview()">Archive Review</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                    <button class="btn btn-primary" onclick="saveReviewChanges()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allReviews = [];

        async function loadReviews() {
            try {
                const res = await apiFetch('/api/reviews/admin/all');
                if(res.ok) {
                    allReviews = await res.json();
                    renderTable(allReviews);
                    updateStats(allReviews);
                }
            } catch(e) {
                console.error('Failed to load reviews', e);
                document.getElementById('reviewsTableBody').innerHTML = '<tr><td colspan="6" class="text-center">Failed to load reviews</td></tr>';
            }
        }

        function updateStats(reviews) {
            // Exclude deleted from stats
            const active = reviews.filter(r => r.status !== 'deleted');
            document.getElementById('statTotal').innerText = active.length;
            document.getElementById('statPending').innerText = active.filter(r => r.status === 'pending').length;
            document.getElementById('statApproved').innerText = active.filter(r => r.status === 'approved').length;
            
            const approved = active.filter(r => r.status === 'approved');
            if(approved.length > 0) {
                const avg = (approved.reduce((sum, r) => sum + r.rating, 0) / approved.length).toFixed(1);
                document.getElementById('statAvgRating').innerText = avg;
            }
        }

        function filterTable() {
            const status = document.getElementById('filterStatus').value;
            const rating = document.getElementById('filterRating').value;
            
            // Hide deleted by default unless explicitly filtering
            let filtered = allReviews.filter(r => r.status !== 'deleted');
            if(status) filtered = filtered.filter(r => r.status === status);
            if(rating) filtered = filtered.filter(r => r.rating.toString() === rating);
            
            renderTable(filtered);
        }

        function renderTable(reviews) {
            const tbody = document.getElementById('reviewsTableBody');
            tbody.innerHTML = '';
            
            if(reviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No reviews found.</td></tr>';
                return;
            }

            reviews.forEach(review => {
                const date = new Date(review.created_at).toLocaleDateString();
                const statusClass = `status-${review.status}`;
                const safeName = escapeHTML(review.name);
                const safeService = escapeHTML(review.service_completed || 'N/A');
                
                let stars = '';
                for(let i=0; i<review.rating; i++) stars += '★';
                
                const tr = document.createElement('tr');
                
                const tdDate = document.createElement('td');
                tdDate.textContent = date;
                
                const tdName = document.createElement('td');
                tdName.innerHTML = `<strong>${safeName}</strong><br><small class="text-muted">${escapeHTML(review.business_name || '')}</small>`;
                
                const tdRating = document.createElement('td');
                tdRating.className = 'rating-stars';
                tdRating.textContent = stars;
                
                const tdService = document.createElement('td');
                tdService.textContent = safeService;
                
                const tdStatus = document.createElement('td');
                tdStatus.innerHTML = `<span class="${statusClass}" style="text-transform: capitalize;">${escapeHTML(review.status)}</span>`;
                
                const tdAction = document.createElement('td');
                const btn = document.createElement('button');
                btn.className = 'btn btn-sm btn-outline-light';
                btn.textContent = 'Manage';
                btn.onclick = () => openReview(review.id);
                tdAction.appendChild(btn);

                tr.append(tdDate, tdName, tdRating, tdService, tdStatus, tdAction);
                tbody.appendChild(tr);
            });
        }
        
        function escapeHTML(str) {
            if(!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function openReview(id) {
            const review = allReviews.find(r => r.id === id);
            if(!review) return;

            document.getElementById('modalReviewId').value = review.id;
            document.getElementById('modalReviewTitle').textContent = review.name || 'Review Details';
            document.getElementById('modalName').textContent = review.name;
            document.getElementById('modalBusiness').textContent = review.business_name || 'N/A';
            
            const urlEl = document.getElementById('modalUrl');
            if(review.website_url) {
                urlEl.href = review.website_url;
                urlEl.textContent = review.website_url;
            } else {
                urlEl.removeAttribute('href');
                urlEl.textContent = 'N/A';
            }

            document.getElementById('modalService').textContent = review.service_completed || 'N/A';
            
            let stars = '';
            for(let i=0; i<review.rating; i++) stars += '★';
            document.getElementById('modalRating').textContent = stars;
            
            document.getElementById('modalDate').textContent = new Date(review.created_at).toLocaleString();
            document.getElementById('modalMessage').textContent = review.message;
            document.getElementById('modalStatusSelect').value = review.status;

            document.getElementById('reviewDetailModal').classList.remove('d-none');
        }

        function closeModal() {
            document.getElementById('reviewDetailModal').classList.add('d-none');
        }

        async function saveReviewChanges() {
            const id = document.getElementById('modalReviewId').value;
            const status = document.getElementById('modalStatusSelect').value;
            
            try {
                const res = await apiFetch(`/api/reviews/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                if(res.ok) {
                    closeModal();
                    loadReviews();
                } else {
                    alert('Failed to update review status');
                }
            } catch(e) {
                console.error(e);
                alert('Error updating review');
            }
        }
        
        async function archiveReview() {
            if(!confirm('Are you sure you want to archive this review? It will be hidden from the list.')) return;
            
            const id = document.getElementById('modalReviewId').value;
            try {
                const res = await apiFetch(`/api/reviews/${id}`, {
                    method: 'DELETE'
                });

                if(res.ok) {
                    closeModal();
                    loadReviews();
                } else {
                    alert('Failed to archive review');
                }
            } catch(e) {
                console.error(e);
                alert('Error archiving review');
            }
        }

        // Init
        loadReviews();
    </script>
</body>
</html>
