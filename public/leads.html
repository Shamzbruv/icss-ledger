<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Leads | ICSS Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/icss-logo.png">
    <style>
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .priority-Hot { color: #ff4757; font-weight: bold; }
        .priority-Warm { color: #ffa502; font-weight: bold; }
        .priority-Cold { color: #7bed9f; font-weight: bold; }
        
        .status-New { background: #3742fa; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Contacted { background: #ffa502; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Qualified { background: #2ed573; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Proposal { background: #1e90ff; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Won { background: #00d2d3; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Lost { background: #ff4757; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-Archived { background: #747d8c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        
        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters-container input, .filters-container select {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 8px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Layout.js injects Header here -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script type="module" src="js/layout.js"></script>

    <div class="container fade-in">
        <h1 class="mb-4">Website Leads / CRM</h1>

        <!-- Stats Row -->
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statNew">0</div>
                <div class="stat-label">New Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statHot">0</div>
                <div class="stat-label">Hot Priority</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statWon">0</div>
                <div class="stat-label">Won</div>
            </div>
        </div>

        <div class="card">
            <div class="filters-container">
                <select id="filterStatus" onchange="loadLeads()">
                    <option value="">All Statuses</option>
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Qualified">Qualified</option>
                    <option value="Proposal Sent">Proposal Sent</option>
                    <option value="Won">Won</option>
                    <option value="Lost">Lost</option>
                </select>
                <select id="filterPriority" onchange="loadLeads()">
                    <option value="">All Priorities</option>
                    <option value="Hot">Hot</option>
                    <option value="Warm">Warm</option>
                    <option value="Cold">Cold</option>
                </select>
                <input type="text" id="searchLeads" placeholder="Search name or email..." onkeyup="filterTable()">
            </div>

            <div class="table-responsive">
                <table class="table-mobile-cards" id="leadsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email / Phone</th>
                            <th>Type</th>
                            <th>Service/Budget</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <tr><td colspan="8" class="text-center">Loading leads...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- LEAD DETAIL MODAL -->
    <div id="leadDetailModal" class="modal-overlay d-none">
        <div class="modal-content card fade-in" style="max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 id="modalLeadName">Lead Details</h3>
                <button class="btn btn-sm btn-outline-light" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalLeadId">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <small class="text-muted">Email</small>
                        <div id="modalLeadEmail"></div>
                    </div>
                    <div>
                        <small class="text-muted">Phone</small>
                        <div id="modalLeadPhone"></div>
                    </div>
                    <div>
                        <small class="text-muted">Business</small>
                        <div id="modalLeadBusiness"></div>
                    </div>
                    <div>
                        <small class="text-muted">Website</small>
                        <div id="modalLeadWebsite"></div>
                    </div>
                </div>

                <div style="background: var(--bg-dark); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h4 style="margin-top: 0;">Request Details</h4>
                    <p><strong>Type:</strong> <span id="modalLeadType"></span></p>
                    <p><strong>Service/Package:</strong> <span id="modalLeadService"></span></p>
                    <p><strong>Budget:</strong> <span id="modalLeadBudget"></span></p>
                    <p><strong>Timeline:</strong> <span id="modalLeadTimeline"></span></p>
                    <p><strong>Message:</strong><br><span id="modalLeadMessage" style="white-space: pre-wrap;"></span></p>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <a id="btnWhatsApp" href="#" target="_blank" class="btn btn-success" style="flex:1; text-align:center;">Chat on WhatsApp</a>
                    <a id="btnEmail" href="#" target="_blank" class="btn btn-outline-light" style="flex:1; text-align:center;">Send Email</a>
                </div>

                <hr>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <label>Status</label>
                        <select id="modalStatusSelect" class="form-control">
                            <option value="New">New</option>
                            <option value="Contacted">Contacted</option>
                            <option value="Qualified">Qualified</option>
                            <option value="Proposal Sent">Proposal Sent</option>
                            <option value="Won">Won</option>
                            <option value="Lost">Lost</option>
                            <option value="Spam">Spam</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>
                    <div>
                        <label>Priority</label>
                        <select id="modalPrioritySelect" class="form-control">
                            <option value="Hot">Hot</option>
                            <option value="Warm">Warm</option>
                            <option value="Cold">Cold</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label>Internal Notes</label>
                    <textarea id="modalInternalNotes" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn btn-primary" onclick="saveLeadChanges()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Check Auth
        async function checkAuth() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) window.location.href = '/login';
            } catch (e) {
                window.location.href = '/login';
            }
        }
        checkAuth();

        let allLeads = [];

        async function loadStats() {
            try {
                const res = await fetch('/api/leads/stats');
                if(res.ok) {
                    const stats = await res.json();
                    document.getElementById('statTotal').innerText = stats.total || 0;
                    document.getElementById('statNew').innerText = stats.new || 0;
                    document.getElementById('statHot').innerText = stats.hot || 0;
                    document.getElementById('statWon').innerText = stats.won || 0;
                }
            } catch(e) { console.error('Failed to load stats', e); }
        }

        async function loadLeads() {
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            let url = '/api/leads?';
            if(status) url += `status=${status}&`;
            if(priority) url += `priority=${priority}`;

            try {
                const res = await fetch(url);
                if(res.ok) {
                    allLeads = await res.json();
                    renderTable(allLeads);
                }
            } catch(e) {
                console.error('Failed to load leads', e);
                document.getElementById('leadsTableBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger">Failed to load leads</td></tr>';
            }
        }

        function renderTable(leads) {
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = '';
            
            if(leads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">No leads found.</td></tr>';
                return;
            }

            leads.forEach(lead => {
                const date = new Date(lead.created_at).toLocaleDateString();
                const statusClass = `status-${lead.status ? lead.status.replace(/\s+/g, '') : 'New'}`;
                const priorityClass = `priority-${lead.priority}`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td><strong>${lead.name}</strong><br><small class="text-muted">${lead.business_name || ''}</small></td>
                    <td>${lead.email || ''}<br>${lead.phone || ''}</td>
                    <td>${lead.lead_type || 'Unknown'}</td>
                    <td>${lead.service_needed || lead.package_name || 'N/A'}<br><small class="text-muted">${lead.budget || ''}</small></td>
                    <td class="${priorityClass}">${lead.priority || 'Warm'}</td>
                    <td><span class="${statusClass}">${lead.status || 'New'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-light" onclick="openLead(${lead.id})">View</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchLeads').value.toLowerCase();
            const filtered = allLeads.filter(l => 
                (l.name && l.name.toLowerCase().includes(query)) || 
                (l.email && l.email.toLowerCase().includes(query)) ||
                (l.business_name && l.business_name.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        function openLead(id) {
            const lead = allLeads.find(l => l.id === id);
            if(!lead) return;

            document.getElementById('modalLeadId').value = lead.id;
            document.getElementById('modalLeadName').innerText = lead.name || 'Unknown Lead';
            document.getElementById('modalLeadEmail').innerText = lead.email || 'N/A';
            document.getElementById('modalLeadPhone').innerText = lead.phone || 'N/A';
            document.getElementById('modalLeadBusiness').innerText = lead.business_name || 'N/A';
            document.getElementById('modalLeadWebsite').innerText = lead.website_url || 'N/A';
            
            document.getElementById('modalLeadType').innerText = lead.lead_type || 'Unknown';
            document.getElementById('modalLeadService').innerText = lead.service_needed || lead.package_name || 'N/A';
            document.getElementById('modalLeadBudget').innerText = lead.budget || 'N/A';
            document.getElementById('modalLeadTimeline').innerText = lead.timeline || 'N/A';
            document.getElementById('modalLeadMessage').innerText = lead.message || 'No message provided.';
            
            document.getElementById('modalStatusSelect').value = lead.status || 'New';
            document.getElementById('modalPrioritySelect').value = lead.priority || 'Warm';
            document.getElementById('modalInternalNotes').value = lead.internal_notes || '';

            // WhatsApp link
            const waBtn = document.getElementById('btnWhatsApp');
            if(lead.phone) {
                const cleanPhone = lead.phone.replace(/[^0-9]/g, '');
                waBtn.href = `https://wa.me/${cleanPhone}?text=Hi ${encodeURIComponent(lead.name)}, thanks for reaching out to iCreate Solutions.`;
                waBtn.style.display = 'inline-block';
            } else {
                waBtn.style.display = 'none';
            }

            // Email link
            const emailBtn = document.getElementById('btnEmail');
            if(lead.email) {
                emailBtn.href = `mailto:${lead.email}?subject=Re: Your inquiry to iCreate Solutions`;
                emailBtn.style.display = 'inline-block';
            } else {
                emailBtn.style.display = 'none';
            }

            document.getElementById('leadDetailModal').classList.remove('d-none');
        }

        function closeModal() {
            document.getElementById('leadDetailModal').classList.add('d-none');
        }

        async function saveLeadChanges() {
            const id = document.getElementById('modalLeadId').value;
            const status = document.getElementById('modalStatusSelect').value;
            const priority = document.getElementById('modalPrioritySelect').value;
            const internal_notes = document.getElementById('modalInternalNotes').value;

            try {
                const res = await fetch(`/api/leads/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status, priority, internal_notes })
                });

                if(res.ok) {
                    closeModal();
                    loadLeads();
                    loadStats();
                } else {
                    alert('Failed to update lead');
                }
            } catch(e) {
                console.error(e);
                alert('Error updating lead');
            }
        }

        // Init
        loadStats();
        loadLeads();
    </script>
</body>
</html>
