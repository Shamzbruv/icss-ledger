<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Leads | ICSS Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/icss-logo.png">
    <style>
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .priority-Hot { color: #ff4757; font-weight: bold; }
        .priority-Warm { color: #ffa502; font-weight: bold; }
        .priority-Cold { color: #7bed9f; font-weight: bold; }
        .status-New,
        .status-Contacted,
        .status-Qualified,
        .status-ProposalSent,
        .status-Won,
        .status-Lost,
        .status-Spam,
        .status-Archived {
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: inline-block;
        }
        .status-New { background: #3742fa; }
        .status-Contacted { background: #ffa502; }
        .status-Qualified { background: #2ed573; }
        .status-ProposalSent { background: #1e90ff; }
        .status-Won { background: #00d2d3; }
        .status-Lost { background: #ff4757; }
        .status-Spam { background: #ff4757; }
        .status-Archived { background: #747d8c; }
        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters-container input,
        .filters-container select {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 8px 12px;
            border-radius: 4px;
        }
        #errorBanner {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script type="module" src="js/layout.js"></script>

    <div class="container fade-in">
        <h1 class="mb-4">Website Leads / CRM</h1>
        <div id="errorBanner" class="d-none"></div>

        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Leads</div></div>
            <div class="stat-card"><div class="stat-value" id="statNew">0</div><div class="stat-label">New Leads</div></div>
            <div class="stat-card"><div class="stat-value" id="statHot">0</div><div class="stat-label">Hot Priority</div></div>
            <div class="stat-card"><div class="stat-value" id="statWon">0</div><div class="stat-label">Won</div></div>
        </div>

        <div class="card">
            <div class="filters-container">
                <select id="filterStatus">
                    <option value="">All Statuses</option>
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Qualified">Qualified</option>
                    <option value="Proposal Sent">Proposal Sent</option>
                    <option value="Won">Won</option>
                    <option value="Lost">Lost</option>
                    <option value="Spam">Spam</option>
                    <option value="Archived">Archived</option>
                </select>
                <select id="filterPriority">
                    <option value="">All Priorities</option>
                    <option value="Hot">Hot</option>
                    <option value="Warm">Warm</option>
                    <option value="Cold">Cold</option>
                </select>
                <input type="text" id="searchLeads" placeholder="Search name, business, email, or phone...">
            </div>

            <div class="table-responsive">
                <table class="table-mobile-cards" id="leadsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email / Phone</th>
                            <th>Type</th>
                            <th>Service/Budget</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <tr><td colspan="8" class="text-center">Loading leads...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="leadDetailModal" class="modal-overlay d-none">
        <div class="modal-content card fade-in" style="max-width: 650px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 id="modalLeadName">Lead Details</h3>
                <button class="btn btn-sm btn-outline-light" id="btnCloseModalTop">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalLeadId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div><small class="text-muted">Email</small><div id="modalLeadEmail"></div></div>
                    <div><small class="text-muted">Phone</small><div id="modalLeadPhone"></div></div>
                    <div><small class="text-muted">Business</small><div id="modalLeadBusiness"></div></div>
                    <div><small class="text-muted">Website</small><div id="modalLeadWebsite"></div></div>
                </div>
                <div style="background: var(--bg-dark); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h4 style="margin-top: 0;">Request Details</h4>
                    <p><strong>Type:</strong> <span id="modalLeadType"></span></p>
                    <p><strong>Service/Package:</strong> <span id="modalLeadService"></span></p>
                    <p><strong>Budget:</strong> <span id="modalLeadBudget"></span></p>
                    <p><strong>Timeline:</strong> <span id="modalLeadTimeline"></span></p>
                    <p><strong>Message:</strong><br><span id="modalLeadMessage" style="white-space: pre-wrap;"></span></p>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <a id="btnWhatsApp" href="#" target="_blank" class="btn btn-success" style="flex:1; text-align:center;">Chat on WhatsApp</a>
                    <a id="btnEmail" href="#" target="_blank" class="btn btn-outline-light" style="flex:1; text-align:center;">Send Email</a>
                </div>
                <hr>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <label>Status</label>
                        <select id="modalStatusSelect" class="form-control">
                            <option value="New">New</option>
                            <option value="Contacted">Contacted</option>
                            <option value="Qualified">Qualified</option>
                            <option value="Proposal Sent">Proposal Sent</option>
                            <option value="Won">Won</option>
                            <option value="Lost">Lost</option>
                            <option value="Spam">Spam</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>
                    <div>
                        <label>Priority</label>
                        <select id="modalPrioritySelect" class="form-control">
                            <option value="Hot">Hot</option>
                            <option value="Warm">Warm</option>
                            <option value="Cold">Cold</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label>Internal Notes</label>
                    <textarea id="modalInternalNotes" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCloseModalBottom">Close</button>
                <button class="btn btn-primary" id="btnSaveLead">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        var allLeads = [];

        function showError(message) {
            var banner = document.getElementById('errorBanner');
            if (!banner) return;
            banner.textContent = message;
            banner.classList.remove('d-none');
        }

        function clearError() {
            var banner = document.getElementById('errorBanner');
            if (banner) banner.classList.add('d-none');
        }

        function escapeHTML(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function readErrorBody(res) {
            try {
                var text = await res.text();
                return text || res.statusText || 'Unknown error';
            } catch (e) {
                return res.statusText || 'Unknown error';
            }
        }

        async function loadStats() {
            try {
                var res = await apiFetch('/api/leads/stats');
                if (!res.ok) {
                    var errorText = await readErrorBody(res);
                    console.error('Failed to load stats:', res.status, errorText);
                    showError('Failed to load lead stats: [' + res.status + '] ' + errorText);
                    return;
                }

                var stats = await res.json();
                document.getElementById('statTotal').textContent = stats.total || 0;
                document.getElementById('statNew').textContent = stats.new || 0;
                document.getElementById('statHot').textContent = stats.hot || 0;
                document.getElementById('statWon').textContent = stats.won || 0;
                clearError();
            } catch (e) {
                console.error('Failed to load stats', e);
                showError('Failed to load lead stats: ' + e.message);
            }
        }

        async function loadLeads() {
            var status = document.getElementById('filterStatus').value;
            var priority = document.getElementById('filterPriority').value;
            var params = new URLSearchParams();
            if (status) params.set('status', status);
            if (priority) params.set('priority', priority);
            var url = '/api/leads' + (params.toString() ? '?' + params.toString() : '');

            try {
                var res = await apiFetch(url);
                if (!res.ok) {
                    var errorText = await readErrorBody(res);
                    console.error('Failed to load leads:', res.status, errorText);
                    document.getElementById('leadsTableBody').innerHTML = '<tr><td colspan="8" class="text-center" style="color: #ff4757;">Failed to load leads: [' + res.status + '] ' + escapeHTML(errorText) + '</td></tr>';
                    return;
                }

                allLeads = await res.json();
                renderTable(allLeads);
            } catch (e) {
                console.error('Failed to load leads', e);
                document.getElementById('leadsTableBody').innerHTML = '<tr><td colspan="8" class="text-center" style="color: #ff4757;">Failed to load leads: ' + escapeHTML(e.message) + '</td></tr>';
            }
        }

        function renderTable(leads) {
            var tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = '';

            if (!Array.isArray(leads) || leads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">No leads found.</td></tr>';
                return;
            }

            leads.forEach(function(lead) {
                var tr = document.createElement('tr');
                var statusValue = lead.status || 'New';
                var priorityValue = lead.priority || 'Warm';
                var statusClass = 'status-' + String(statusValue).replace(/\s+/g, '');
                var priorityClass = 'priority-' + priorityValue;
                var created = lead.created_at ? new Date(lead.created_at).toLocaleString() : 'N/A';

                var tdDate = document.createElement('td');
                tdDate.textContent = created;

                var tdName = document.createElement('td');
                tdName.innerHTML = '<strong>' + escapeHTML(lead.name || 'Unknown') + '</strong><br><small class="text-muted">' + escapeHTML(lead.business_name || '') + '</small>';

                var tdContact = document.createElement('td');
                tdContact.innerHTML = escapeHTML(lead.email || '') + '<br>' + escapeHTML(lead.phone || '');

                var tdType = document.createElement('td');
                tdType.textContent = lead.lead_type || 'Unknown';

                var tdService = document.createElement('td');
                tdService.innerHTML = escapeHTML(lead.service_needed || lead.package_name || 'N/A') + '<br><small class="text-muted">' + escapeHTML(lead.budget || '') + '</small>';

                var tdPriority = document.createElement('td');
                tdPriority.className = priorityClass;
                tdPriority.textContent = priorityValue;

                var tdStatus = document.createElement('td');
                var statusSpan = document.createElement('span');
                statusSpan.className = statusClass;
                statusSpan.textContent = statusValue;
                tdStatus.appendChild(statusSpan);

                var tdAction = document.createElement('td');
                var btn = document.createElement('button');
                btn.className = 'btn btn-sm btn-outline-light';
                btn.type = 'button';
                btn.textContent = 'View';
                btn.addEventListener('click', function() { openLead(lead.id); });
                tdAction.appendChild(btn);

                tr.append(tdDate, tdName, tdContact, tdType, tdService, tdPriority, tdStatus, tdAction);
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            var query = document.getElementById('searchLeads').value.toLowerCase();
            var filtered = allLeads.filter(function(lead) {
                return (lead.name && lead.name.toLowerCase().includes(query)) ||
                    (lead.email && lead.email.toLowerCase().includes(query)) ||
                    (lead.phone && lead.phone.toLowerCase().includes(query)) ||
                    (lead.business_name && lead.business_name.toLowerCase().includes(query));
            });
            renderTable(filtered);
        }

        function openLead(id) {
            var lead = allLeads.find(function(item) { return item.id === id; });
            if (!lead) return;

            document.getElementById('modalLeadId').value = lead.id;
            document.getElementById('modalLeadName').textContent = lead.name || 'Unknown Lead';
            document.getElementById('modalLeadEmail').textContent = lead.email || 'N/A';
            document.getElementById('modalLeadPhone').textContent = lead.phone || 'N/A';
            document.getElementById('modalLeadBusiness').textContent = lead.business_name || 'N/A';
            document.getElementById('modalLeadWebsite').textContent = lead.website_url || 'N/A';
            document.getElementById('modalLeadType').textContent = lead.lead_type || 'Unknown';
            document.getElementById('modalLeadService').textContent = lead.service_needed || lead.package_name || 'N/A';
            document.getElementById('modalLeadBudget').textContent = lead.budget || 'N/A';
            document.getElementById('modalLeadTimeline').textContent = lead.timeline || 'N/A';
            document.getElementById('modalLeadMessage').textContent = lead.message || lead.description || lead.goal || 'No message provided.';
            document.getElementById('modalStatusSelect').value = lead.status || 'New';
            document.getElementById('modalPrioritySelect').value = lead.priority || 'Warm';
            document.getElementById('modalInternalNotes').value = lead.internal_notes || '';

            var waBtn = document.getElementById('btnWhatsApp');
            if (lead.phone) {
                var cleanPhone = String(lead.phone).replace(/[^0-9]/g, '');
                waBtn.href = 'https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent('Hi ' + (lead.name || '') + ', thanks for reaching out to iCreate Solutions.');
                waBtn.style.display = 'inline-block';
            } else {
                waBtn.style.display = 'none';
            }

            var emailBtn = document.getElementById('btnEmail');
            if (lead.email) {
                emailBtn.href = 'mailto:' + encodeURIComponent(lead.email) + '?subject=' + encodeURIComponent('Re: Your inquiry to iCreate Solutions');
                emailBtn.style.display = 'inline-block';
            } else {
                emailBtn.style.display = 'none';
            }

            document.getElementById('leadDetailModal').classList.remove('d-none');
        }

        function closeModal() {
            document.getElementById('leadDetailModal').classList.add('d-none');
        }

        async function saveLeadChanges() {
            var id = document.getElementById('modalLeadId').value;
            var status = document.getElementById('modalStatusSelect').value;
            var priority = document.getElementById('modalPrioritySelect').value;
            var internal_notes = document.getElementById('modalInternalNotes').value;

            try {
                var res = await apiFetch('/api/leads/' + encodeURIComponent(id), {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status, priority: priority, internal_notes: internal_notes })
                });

                if (res.ok) {
                    closeModal();
                    await loadLeads();
                    await loadStats();
                } else {
                    var errorText = await readErrorBody(res);
                    alert('Failed to update lead: ' + errorText);
                }
            } catch (e) {
                console.error(e);
                alert('Error updating lead: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('filterStatus').addEventListener('change', loadLeads);
            document.getElementById('filterPriority').addEventListener('change', loadLeads);
            document.getElementById('searchLeads').addEventListener('input', filterTable);
            document.getElementById('btnCloseModalTop').addEventListener('click', closeModal);
            document.getElementById('btnCloseModalBottom').addEventListener('click', closeModal);
            document.getElementById('btnSaveLead').addEventListener('click', saveLeadChanges);
            loadStats();
            loadLeads();
        });
    </script>
</body>
</html>
